<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RushTime — Oslo Trafikkprediksjon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --accent: #ff4d00;
    --green: #00ff88;
    --yellow: #ffd600;
    --red: #ff2d55;
    --purple: #7b00ff;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    z-index: 1000;
    flex-shrink: 0;
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .search-container {
    display: flex;
    gap: 8px;
    flex: 1;
    align-items: center;
  }

  .search-wrapper {
    position: relative;
    flex: 1;
    min-width: 0;
  }

  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    color: var(--text);
    font-family: var(--font-display);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .suggestions {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    z-index: 9999;
    display: none;
    max-height: 220px;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .suggestion-item {
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }

  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--bg); }
  .suggestion-item:hover .sug-main { color: var(--accent); }

  .sug-icon { font-size: 14px; flex-shrink: 0; }
  .sug-main {
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.15s;
  }

  .swap-btn {
    background: var(--border);
    border: none;
    border-radius: 6px;
    width: 34px;
    height: 34px;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .swap-btn:hover { background: var(--accent); color: white; }

  .action-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    color: var(--text);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }

  .action-btn:hover { opacity: 0.8; }

  .weather-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .weather-badge span { color: var(--text); }

  .timeline-bar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 999;
    flex-shrink: 0;
  }

  .time-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .time-display {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    min-width: 110px;
    text-align: center;
  }

  .timeline-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .timeline-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(255,77,0,0.5);
  }

  .legend {
    display: flex;
    gap: 14px;
    align-items: center;
    flex-shrink: 0;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--muted);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  #map {
    flex: 1;
    z-index: 1;
  }

  .travel-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 1000;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    min-width: 160px;
  }

  .travel-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: var(--font-mono);
    margin-bottom: 4px;
  }

  .travel-time {
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .travel-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-top: 4px;
  }

  .zoom-btns {
    position: absolute;
    bottom: 40px;
    right: 16px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .zoom-btn {
    width: 36px;
    height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .zoom-btn:hover { border-color: var(--accent); color: var(--accent); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-title {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 20px;
    letter-spacing: -0.3px;
  }

  .modal-sliders {
    background: var(--bg);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .modal-slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .modal-slider-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    outline: none;
  }

  .modal-slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .modal-val {
    min-width: 52px;
    text-align: right;
    color: var(--text);
    font-weight: 700;
  }

  .modal-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .modal-option {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s;
  }

  .modal-option.winner { border-color: var(--green); }

  .option-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .option-icon.car { background: rgba(255,77,0,0.15); }
  .option-icon.bus { background: rgba(0,255,136,0.1); }

  .option-text { flex: 1; }
  .option-label { font-size: 13px; font-weight: 600; }
  .option-detail {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-top: 3px;
  }

  .winner-tag {
    font-size: 10px;
    font-weight: 700;
    background: rgba(0,255,136,0.15);
    color: var(--green);
    padding: 3px 8px;
    border-radius: 4px;
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
  }

  .modal-close {
    width: 100%;
    padding: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font-display);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-close:hover { border-color: var(--muted); color: var(--text); }

  .leaflet-container { background: #0d0d14 !important; }
  .leaflet-control-zoom { display: none; }
  .leaflet-popup-content-wrapper {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    padding: 0 !important;
  }
  .leaflet-popup-tip { display: none; }
  .leaflet-popup-content { margin: 0 !important; }

  /* Lastelinje */
  #loadingBar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), #ff8c00, var(--accent), transparent);
    background-size: 300% 100%;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    animation: barMove 1.2s infinite linear;
  }
  #loadingBar.active { opacity: 1; }
  @keyframes barMove {
    0%   { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  /* Posisjonsknapp inne i søkefelt */
  .locate-btn {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 2px;
    transition: color 0.15s;
    z-index: 2;
  }
  .locate-btn:hover { color: var(--accent); }
  .search-input { padding-right: 28px; }

  /* Nullstill rute-knapp i travel badge */
  #clearRouteBtn {
    display: none;
    align-items: center;
    justify-content: center;
    margin-top: 8px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 8px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    cursor: pointer;
    width: 100%;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  #clearRouteBtn:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div id="loadingBar"></div>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    RushTime
  </div>

  <div class="search-container">
    <div class="search-wrapper">
      <input class="search-input" id="fromInput"
        placeholder="Fra: Majorstuen, Oslo..."
        type="text"
        autocomplete="off"
        oninput="fetchSuggestions(this.value, 'fromInput')"
        onblur="setTimeout(()=>hideSuggestions('fromInput'), 200)"
        onkeydown="if(event.key==='Enter') searchRoute()">
      <button type="button" class="locate-btn" onclick="geolocate('fromInput')" title="Bruk min posisjon">📍</button>
    </div>

    <button type="button" class="swap-btn" onclick="swapAddresses()" title="Bytt">⇅</button>

    <div class="search-wrapper">
      <input class="search-input" id="toInput"
        placeholder="Til: Jernbanetorget, Oslo..."
        type="text"
        autocomplete="off"
        oninput="fetchSuggestions(this.value, 'toInput')"
        onblur="setTimeout(()=>hideSuggestions('toInput'), 200)"
        onkeydown="if(event.key==='Enter') searchRoute()">
    </div>

    <button type="button" class="action-btn" onclick="searchRoute()"
      style="border-color:var(--green);color:var(--green)">
      🔍 Søk
    </button>

    <button type="button" class="action-btn" onclick="openModal()">
      Bil vs kollektiv
    </button>

    <button type="button" class="action-btn" id="toggleBtn" onclick="toggleTrafficLayer()"
      style="border-color:var(--accent);color:var(--accent)">
      Kø AV
    </button>
  </div>

  <div class="weather-badge">
    <span id="weatherTemp">--°C</span>
    <span id="weatherDesc">Laster...</span>
  </div>
</header>

<div class="timeline-bar">
  <span class="time-label">Nå</span>
  <input type="range" class="timeline-slider" id="timeSlider" min="0" max="24" value="0" step="1">
  <span class="time-label">+12t</span>
  <div class="time-display" id="timeDisplay">NÅ</div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#00ff88"></div>Fri
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#ffd600"></div>Lav
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#ff4d00"></div>Kø
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#7b00ff"></div>Stopp
    </div>
  </div>
</div>

<div style="position:relative;flex:1;display:flex;flex-direction:column;">
  <div id="map"></div>

  <div class="travel-badge">
    <div class="travel-label">Estimert reisetid</div>
    <div class="travel-time" id="travelTime">-- min</div>
    <div class="travel-sub" id="travelSub">Velg rute for estimat</div>
    <button type="button" id="clearRouteBtn" onclick="clearRoute()">× Nullstill rute</button>
  </div>

  <div class="zoom-btns">
    <button type="button" class="zoom-btn" onclick="map.zoomIn()">+</button>
    <button type="button" class="zoom-btn" onclick="map.zoomOut()">−</button>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Bil eller kollektiv?</div>
    <div class="modal-sliders">
      <div class="modal-slider-row">
        🕐 Avreise
        <input type="range" min="6" max="22" value="8" step="1" id="mTime">
        <span class="modal-val" id="mTimeVal">08:00</span>
      </div>
      <div class="modal-slider-row">
        🔄 Tur-retur
        <input type="range" min="0" max="1" value="1" step="1" id="mReturn">
        <span class="modal-val" id="mReturnVal">Ja</span>
      </div>
      <div class="modal-slider-row">
        🌧 Vær-faktor
        <input type="range" min="0" max="2" value="1" step="1" id="mWeather">
        <span class="modal-val" id="mWeatherVal">Middels</span>
      </div>
    </div>
    <div class="modal-options">
      <div class="modal-option winner" id="opt1">
        <div class="option-icon bus" id="opt1Icon">🚇</div>
        <div class="option-text">
          <div class="option-label" id="opt1Label">Ta kollektivt</div>
          <div class="option-detail" id="opt1Detail">T-bane · 22 min · Slipper kø</div>
        </div>
        <span class="winner-tag">ANBEFALT</span>
      </div>
      <div class="modal-option" id="opt2">
        <div class="option-icon car" id="opt2Icon">🚗</div>
        <div class="option-text">
          <div class="option-label" id="opt2Label">Kjør bil</div>
          <div class="option-detail" id="opt2Detail">Ring 1 · 35 min · Mye kø</div>
        </div>
      </div>
    </div>
    <button type="button" class="modal-close" onclick="closeModal()">Lukk</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="map.js"></script>
</body>
</html>
